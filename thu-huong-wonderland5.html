  <style type="text/css">
    html,
    body {
      height: 100%;
      padding: 0;
      margin: 0;
      background: #101010;
      position: relative;
      overflow: hidden;

      .pacifico-regular {
        font-family: "Pacifico", serif;
        font-weight: 400;
        font-style: normal;
        font-family: "Pacifico", serif;
      }
    }

    canvas {
      position: absolute;
      width: 100%;
      height: 100%;
    }

    .namebox {
      color: #fff;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    .namebox h1 {
      margin: 0 auto;
      font-family: "Pacifico", serif;
      font-size: 30px;
    }

    .message {
      font-family: "Poppins", sans-serif;
      font-weight: 300;
      font-style: italic;
      font-size: 20px;
      letter-spacing: .3px;
      color: #fefefef4;
      margin-top: 10px;
      opacity: 1;
      min-height: 1.4em;
      /* giữ chỗ để không bị "nhảy" layout khi chữ đang gõ dần */
      transition: opacity .8s ease;
    }

    .message.fade-out {
      opacity: 0;
    }

    /* con trỏ nhấp nháy kiểu máy đánh chữ */
    .message .cursor {
      display: inline-block;
      margin-left: 2px;
      animation: blink 1s step-start infinite;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0;
      }
    }

    .copy {
      position: absolute;
      bottom: 10%;
      left: 50%;
      transform: translateX(-50%);
      font-family: "Arial", sans-serif;
      font-size: 22px;
      color: #ff16c2;
      text-align: center;
    }

    .copy a {
      color: #6666669c;
    }

    .cat-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 5;
    }

    .cat {
      position: absolute;
      width: 60px;
      mix-blend-mode: screen;
      user-select: none;
      filter: drop-shadow(0 0 8px rgba(255, 255, 255, .5));
      /* trạng thái ban đầu: ẩn, thu nhỏ, hơi xoay — sẽ "nở" ra khi JS thêm class .visible */
      opacity: 0;
      transform: scale(.25) rotate(-20deg);
      transition: opacity .7s cubic-bezier(.34, 1.56, .64, 1),
        transform .7s cubic-bezier(.34, 1.56, .64, 1);
    }

    .cat.visible {
      opacity: 1;
      transform: scale(1) rotate(0deg);
    }

    /* float + spin chỉ bắt đầu SAU khi mèo đã hiện ra xong (class .floating do JS thêm) */
    /* --dur, --amp, --spindur, --delay được JS gán random cho từng con để nhịp KHÔNG đồng bộ, quậy tự nhiên hơn */
    .cat.floating {
      animation:
        wiggle var(--dur, 3s) ease-in-out infinite,
        spin var(--spindur, 20s) linear infinite;
      animation-delay: var(--delay, 0s), 0s;
    }

    /* mèo "nhảy dựng" bất chợt, thay thế tạm cho wiggle rồi quay lại */
    .cat.hopping {
      animation: hop .6s cubic-bezier(.34, 1.6, .5, 1) 1,
        spin var(--spindur, 20s) linear infinite;
    }

    /* vị trí xung quanh trái tim */

    .cat1 {
      top: 8%;
      left: 45%;
      animation-delay: .2s;
    }

    .cat2 {
      top: 15%;
      left: 25%;
      animation-delay: .8s;
    }

    .cat3 {
      top: 18%;
      left: 65%;
      animation-delay: 1.5s;
    }

    .cat4 {
      top: 30%;
      left: 15%;
      animation-delay: .4s;
    }

    .cat5 {
      top: 32%;
      left: 78%;
      animation-delay: 1.2s;
    }

    .cat6 {
      top: 45%;
      left: 10%;
      animation-delay: 2.5s;
    }

    .cat7 {
      top: 48%;
      left: 82%;
      animation-delay: .7s;
    }

    .cat8 {
      top: 65%;
      left: 18%;
      animation-delay: 1.8s;
    }

    .cat9 {
      top: 70%;
      left: 75%;
      animation-delay: 2.2s;
    }

    .cat10 {
      top: 82%;
      left: 45%;
      animation-delay: .3s;
    }

    .cat11 {
      top: 60%;
      left: 35%;
      animation-delay: 1.6s;
    }

    .cat12 {
      top: 60%;
      left: 58%;
      animation-delay: 2.9s;
    }

    .cat13 {
      top: 25%;
      left: 40%;
      animation-delay: 1.1s;
    }

    .cat14 {
      top: 25%;
      left: 55%;
      animation-delay: 2.0s;
    }

    .cat15 {
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(.9);
      animation-delay: .9s;
    }

    @keyframes wiggle {
      0% {
        transform: translate(0, 0) rotate(calc(var(--wr, 8deg) * -1)) scale(1, 1);
      }

      20% {
        transform: translate(var(--wx, 7px), calc(var(--wy, 10px) * -1)) rotate(calc(var(--wr, 8deg) * .6)) scale(1.08, .92);
      }

      40% {
        transform: translate(calc(var(--wx, 7px) * -.7), calc(var(--wy, 10px) * -2)) rotate(calc(var(--wr, 8deg) * -1.1)) scale(.92, 1.08);
      }

      60% {
        transform: translate(calc(var(--wx, 7px) * .85), calc(var(--wy, 10px) * -.9)) rotate(var(--wr, 8deg)) scale(1.06, .94);
      }

      80% {
        transform: translate(calc(var(--wx, 7px) * -.85), calc(var(--wy, 10px) * -.2)) rotate(calc(var(--wr, 8deg) * -.6)) scale(1, 1);
      }

      100% {
        transform: translate(0, 0) rotate(calc(var(--wr, 8deg) * -1)) scale(1, 1);
      }
    }

    @keyframes hop {
      0% {
        transform: scale(1, 1) translate(0, 0) rotate(0deg);
      }

      15% {
        transform: scale(1.2, .8) translate(0, 0) rotate(calc(var(--hopR, 8deg) * -1));
      }

      45% {
        transform: scale(.85, 1.15) translate(var(--hopX, 0px), calc(var(--hopH, 42px) * -1)) rotate(var(--hopR, 12deg));
      }

      70% {
        transform: scale(1.08, .92) translate(calc(var(--hopX, 0px) * .5), calc(var(--hopH, 42px) * -.2)) rotate(calc(var(--hopR, 12deg) * -.8));
      }

      100% {
        transform: scale(1, 1) translate(0, 0) rotate(0deg);
      }
    }

    @keyframes spin {
      from {
        filter: hue-rotate(0deg) drop-shadow(0 0 6px pink);
      }

      to {
        filter: hue-rotate(360deg) drop-shadow(0 0 12px hotpink);
      }
    }

    /* ---------- Màn hình bắt đầu ---------- */
    .frame1 {
      opacity: 0;
      visibility: hidden;
      transition: opacity 1s ease-in-out;

    .frame1.started {

    .start-screen {
      position: fixed;

      z-index: 20;
      display: flex;
      flex-direction: column;

    }

    .start-screen.hide {

    .start-screen h2 {
      color: #fff;

    .start-eyebrow {

      font-style: italic;
      font-size: 15px;
      letter-spacing: .3px;
      text-align: center;
      max-width: 420px;
      margin: 0;
      padding: 0 20px;

    }

    .start-btn {
      background: linear-gradient(135deg, #ff6fb5, #c93cff);
      color: #fff;
      border: none;
      padding: 14px 46px;
      border-radius: 40px;
      font-family: "Poppins", sans-serif;
      font-weight: 500;
      font-size: 16px;
      letter-spacing: 1px;

      cursor: pointer;
      box-shadow: 0 4px 24px rgba(255, 111, 181, .45);

    .start-btn.caught {

    .start-btn.caught:hover {
      transform: translateY(-2px) scale(1.05);
    }

    .start-btn:active {
      transform: translateY(0) scale(.97);
    }
  </style>
</head>

<body>

  <script>
    var settings = {
      particles: {
        length: 500, // maximum amount of particles
        duration: 2, // particle duration in sec
        velocity: 100, // particle velocity in pixels/sec
        effect: -0.75, // play with this for a nice effect
        size: 30, // particle size in pixels
      },
    };
    (function () {
      var b = 0;
      var c = ["ms", "moz", "webkit", "o"];
      for (var a = 0; a < c.length && !window.requestAnimationFrame; ++a) {
        window.requestAnimationFrame = window[c[a] + "RequestAnimationFrame"];
        window.cancelAnimationFrame =
          window[c[a] + "CancelAnimationFrame"] ||
          window[c[a] + "CancelRequestAnimationFrame"];
      }
      if (!window.requestAnimationFrame) {
        window.requestAnimationFrame = function (h, e) {
          var d = new Date().getTime();
          var f = Math.max(0, 16 - (d - b));
          var g = window.setTimeout(function () {
            h(d + f);
          }, f);
          b = d + f;
          return g;
        };
      }
      if (!window.cancelAnimationFrame) {
        window.cancelAnimationFrame = function (d) {
          clearTimeout(d);
        };
      }
    })();

    var Point = (function () {
      function Point(x, y) {
        this.x = typeof x !== "undefined" ? x : 0;
        this.y = typeof y !== "undefined" ? y : 0;
      }
      Point.prototype.clone = function () {
        return new Point(this.x, this.y);
      };
      Point.prototype.length = function (length) {
        if (typeof length == "undefined")
          return Math.sqrt(this.x * this.x + this.y * this.y);
        this.normalize();
        this.x *= length;
        this.y *= length;
        return this;
      };

      Point.prototype.normalize = function () {
        var length = this.length();
        this.x /= length;
        this.y /= length;
        return this;
      };
      return Point;
    })();

    var Particle = (function () {
      function Particle() {
        this.position = new Point();
        this.velocity = new Point();
        this.acceleration = new Point();
        this.age = 0;
      }
      Particle.prototype.initialize = function (x, y, dx, dy) {
        this.position.x = x;
        this.position.y = y;
        this.velocity.x = dx;
        this.velocity.y = dy;
        this.acceleration.x = dx * settings.particles.effect;
        this.acceleration.y = dy * settings.particles.effect;
        this.age = 0;
      };
      Particle.prototype.update = function (deltaTime) {
        this.position.x += this.velocity.x * deltaTime;
        this.position.y += this.velocity.y * deltaTime;
        this.velocity.x += this.acceleration.x * deltaTime;
        this.velocity.y += this.acceleration.y * deltaTime;
        this.age += deltaTime;
      };

      Particle.prototype.draw = function (context, image) {
        function ease(t) {
          return --t * t * t + 1;
        }
        var size = image.width * ease(this.age / settings.particles.duration);
        context.globalAlpha = 1 - this.age / settings.particles.duration;
        context.drawImage(
          image,
          this.position.x - size / 2,
          this.position.y - size / 2,
          size,
          size
        );
      };
      return Particle;
    })();

    /*
     * ParticlePool class
     */
    var ParticlePool = (function () {
      var particles,
        firstActive = 0,
        firstFree = 0,
        duration = settings.particles.duration;
      function ParticlePool(length) {
        particles = new Array(length);
        for (var i = 0; i < particles.length; i++)
          particles[i] = new Particle();
      }
      ParticlePool.prototype.add = function (x, y, dx, dy) {
        particles[firstFree].initialize(x, y, dx, dy);
        firstFree++;
        if (firstFree == particles.length) firstFree = 0;
        if (firstActive == firstFree) firstActive++;
        if (firstActive == particles.length) firstActive = 0;
      };
      ParticlePool.prototype.update = function (deltaTime) {
        var i;
        if (firstActive < firstFree) {
          for (i = firstActive; i < firstFree; i++)
            particles[i].update(deltaTime);
        }
        if (firstFree < firstActive) {
          for (i = firstActive; i < particles.length; i++)
            particles[i].update(deltaTime);
          for (i = 0; i < firstFree; i++) particles[i].update(deltaTime);
        }
        while (
          particles[firstActive].age >= duration &&
          firstActive != firstFree
        ) {
          firstActive++;
          if (firstActive == particles.length) firstActive = 0;
        }
      };
      ParticlePool.prototype.draw = function (context, image) {
        var i;
        if (firstActive < firstFree) {
          for (i = firstActive; i < firstFree; i++)
            particles[i].draw(context, image);
        }
        if (firstFree < firstActive) {
          for (i = firstActive; i < particles.length; i++)
            particles[i].draw(context, image);
          for (i = 0; i < firstFree; i++) particles[i].draw(context, image);
        }
      };
      return ParticlePool;
    })();

    /*
     * Toàn bộ hiệu ứng canvas (sao + trái tim particle) được bọc trong
     * hàm startHeartEffect() — chỉ gọi khi người dùng bấm nút "Bắt đầu".
     */
    var heartStarted = false;

    function startHeartEffect() {
      if (heartStarted) return; // tránh khởi động 2 lần nếu bấm nhiều lần
      heartStarted = true;

      var canvas = document.getElementById("pinkboard");
      var context = canvas.getContext("2d"),
        particles = new ParticlePool(settings.particles.length),
        particleRate =
          settings.particles.length / settings.particles.duration, // particles/sec
        time;

      // ---- star background setup ----
      var starCount = 500,
        colorrange = [0, 60, 240],
        stars = [];

      function getRandom(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
      }

      function generateStars() {
        stars = [];
        for (var i = 0; i < starCount; i++) {
          stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            radius: Math.random() * 1.2,
            hue: colorrange[getRandom(0, colorrange.length - 1)],
            sat: getRandom(50, 100),
          });
        }
      }

      function drawStars() {
        for (var i = 0; i < stars.length; i++) {
          var s = stars[i];
          context.beginPath();
          context.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
          context.fillStyle = "hsl(" + s.hue + ", " + s.sat + "%, 88%)";
          context.fill();
        }
      }
      // ---- end star background setup ----

      // get point on heart with -PI <= t <= PI
      function pointOnHeart(t) {
        return new Point(
          160 * Math.pow(Math.sin(t), 3),
          130 * Math.cos(t) -
          50 * Math.cos(2 * t) -
          20 * Math.cos(3 * t) -
          10 * Math.cos(4 * t) +
          25
        );
      }

      // creating the particle image using a dummy canvas
      var image = (function () {
        var canvas = document.createElement("canvas"),
          context = canvas.getContext("2d");
        canvas.width = settings.particles.size;
        canvas.height = settings.particles.size;

        function to(t) {
          var point = pointOnHeart(t);
          point.x =
            settings.particles.size / 2 +
            (point.x * settings.particles.size) / 350;
          point.y =
            settings.particles.size / 2 -
            (point.y * settings.particles.size) / 350;
          return point;
        }

        context.beginPath();
        var t = -Math.PI;
        var point = to(t);
        context.moveTo(point.x, point.y);
        while (t < Math.PI) {
          t += 0.01;
          point = to(t);
          context.lineTo(point.x, point.y);
        }
        context.closePath();

        context.fillStyle = "#ff30c5";
        context.fill();

        var image = new Image();
        image.src = canvas.toDataURL();
        return image;
      })();

      // render loop: clear -> draw stars -> draw heart particles
      function render() {
        requestAnimationFrame(render);

        var newTime = new Date().getTime() / 1000,
          deltaTime = newTime - (time || newTime);
        time = newTime;

        context.clearRect(0, 0, canvas.width, canvas.height);

        context.globalAlpha = 1;
        drawStars();

        var amount = particleRate * deltaTime;
        for (var i = 0; i < amount; i++) {
          var pos = pointOnHeart(Math.PI - 2 * Math.PI * Math.random());
          var dir = pos.clone().length(settings.particles.velocity);
          particles.add(
            canvas.width / 2 + pos.x,
            canvas.height / 2 - pos.y,
            dir.x,
            -dir.y
          );
        }

        particles.update(deltaTime);
        particles.draw(context, image);
      }

      function onResize() {
        canvas.width = canvas.clientWidth;
        canvas.height = canvas.clientHeight;
        generateStars();
      }
      window.addEventListener("resize", onResize);

      onResize();
      render();
    }

    // ---- Mèo xuất hiện lần lượt (staggered fade-in), sau đó mới bắt đầu wiggle/spin ----
    function revealCats() {
      var cats = document.querySelectorAll(".cat");
      cats.forEach(function (cat, index) {
        // ----- nhịp thời gian riêng -----
        cat.style.setProperty("--dur", (2.2 + Math.random() * 1.8).toFixed(2) + "s");
        cat.style.setProperty("--spindur", (12 + Math.random() * 12).toFixed(2) + "s");
        cat.style.setProperty("--delay", (Math.random() * 2).toFixed(2) + "s");

        // ----- biên độ wiggle riêng: con lắc mạnh, con lắc nhẹ, con nghiêng trái/phải khác nhau -----
        cat.style.setProperty("--wx", (4 + Math.random() * 10).toFixed(1) + "px");
        cat.style.setProperty("--wy", (7 + Math.random() * 15).toFixed(1) + "px");
        cat.style.setProperty("--wr", (3 + Math.random() * 11).toFixed(1) + "deg");

        // ----- độ cao / hướng nhảy riêng cho mỗi con -----
        cat.style.setProperty("--hopH", (26 + Math.random() * 46).toFixed(1) + "px");
        cat.style.setProperty("--hopR", (6 + Math.random() * 16).toFixed(1) + "deg");
        cat.style.setProperty("--hopX", ((Math.random() - 0.5) * 90).toFixed(1) + "px");

        // ----- kích thước hơi khác nhau để không "y hệt bản sao" -----
        cat.style.width = (48 + Math.random() * 24).toFixed(0) + "px";

        var appearDelay = index * 140; // mỗi con cách nhau 140ms — chỉnh số này để nhanh/chậm hơn
        setTimeout(function () {
          cat.classList.add("visible");
          // đợi hiệu ứng "nở ra" (transition .7s) xong rồi mới bật wiggle/spin
          setTimeout(function () {
            cat.classList.add("floating");
            scheduleHop(cat); // bắt đầu lên lịch những cú nhảy dựng bất chợt
          }, 700);
        }, appearDelay);
      });
    }

    // ---- Thỉnh thoảng cho 1 con mèo nhảy dựng lên bất ngờ, rồi quay lại lắc lư bình thường ----
    function scheduleHop(cat) {
      var wait = 2500 + Math.random() * 4000; // 2.5s - 6.5s giữa các lần nhảy — chỉnh tại đây
      setTimeout(function () {
        cat.classList.remove("floating");
        cat.classList.add("hopping");

        function onHopEnd(e) {
          if (e.animationName !== "hop") return;
          cat.removeEventListener("animationend", onHopEnd);
          cat.classList.remove("hopping");
          cat.classList.add("floating");
          scheduleHop(cat); // lặp lại vô tận, mỗi lần cách nhau ngẫu nhiên
        }
        cat.addEventListener("animationend", onHopEnd);
      }, wait);
    }

    // ---- Chữ: hiệu ứng gõ máy chữ (typewriter) + xoay vòng nhiều câu quote ----
    // Đổi nội dung mảng dưới thành các câu bạn muốn hiển thị
    var quotes = [
      "Good morning, my love ☀️",
      "Here's a million hearts, all for you 💕",
      "I hope you're always happy 🌷",
    ];

    function typeWriter(el, text, speed, onDone) {
      var i = 0;
      el.innerHTML = '<span class="typed"></span><span class="cursor">|</span>';
      var typedSpan = el.querySelector(".typed");

      function step() {
        if (i < text.length) {
          typedSpan.textContent += text.charAt(i);
          i++;
          setTimeout(step, speed);
        } else if (onDone) {
          onDone();
        }
      }
      step();
    }

    function cycleQuotes(el, list, index) {
      typeWriter(el, list[index], 80, function () {
        var isLast = index >= list.length - 1;
        if (isLast) {
          // đã chạy hết 1 lượt — dừng lại ở câu cuối, xoá con trỏ nhấp nháy
          var cursor = el.querySelector(".cursor");
          if (cursor) cursor.remove();
          return;
        }
        // giữ câu hiện tại trên màn hình một lúc rồi mới chuyển sang câu kế
        setTimeout(function () {
          el.classList.add("fade-out");
          setTimeout(function () {
            el.classList.remove("fade-out");
            cycleQuotes(el, list, index + 1);
          }, 800); // thời gian fade out, khớp với transition trong CSS
        }, 3200); // thời gian giữ câu hiện tại trước khi đổi — chỉnh tại đây
      });
    }

    function startQuotes() {
      var quoteEl = document.getElementById("quoteText");
      // đợi 1s cho màn hình ổn định rồi mới bắt đầu gõ câu đầu tiên
      setTimeout(function () {
        cycleQuotes(quoteEl, quotes, 0);
      }, 1000);
    }

    // ---- Nút "Open" né chuột vài lần cho vui, sau đó đứng yên để bấm được ----
    (function () {
      var btn = document.getElementById("startBtn");
      var dodgeCount = 0;
      var maxDodges = 4; // đổi số này nếu muốn né nhiều/ít lần hơn

      btn.addEventListener("mouseenter", function (e) {
        if (dodgeCount >= maxDodges) return; // đã đủ lần né, để yên cho bấm
        dodgeCount++;

        var rect = btn.getBoundingClientRect();
        var btnCenterX = rect.left + rect.width / 2;
        var btnCenterY = rect.top + rect.height / 2;

        // hướng né: ngược lại với vị trí con chuột so với tâm nút
        var dirX = btnCenterX - e.clientX;
        var dirY = btnCenterY - e.clientY;
        var len = Math.sqrt(dirX * dirX + dirY * dirY) || 1;
        dirX /= len;
        dirY /= len;

        var distance = 90 + Math.random() * 50; // khoảng cách né mỗi lần
        var moveX = dirX * distance + (Math.random() - 0.5) * 40;
        var moveY = dirY * distance + (Math.random() - 0.5) * 24;

        // giới hạn không cho nút bay quá xa khỏi vùng nhìn thấy
        var maxOffset = 150;
        moveX = Math.max(-maxOffset, Math.min(maxOffset, moveX));
        moveY = Math.max(-maxOffset, Math.min(maxOffset, moveY));

        btn.style.transform = "translate(" + moveX + "px, " + moveY + "px)";

        if (dodgeCount >= maxDodges) {
          // né đủ số lần rồi — "chịu thua", đứng yên tại chỗ để người dùng bấm được
          setTimeout(function () {
            btn.classList.add("caught");
          }, 380);
        }
      });
    })();

    // ---- Nút bấm bắt đầu ----
    document.getElementById("startBtn").addEventListener("click", function () {
      var startScreen = document.getElementById("startScreen");
      var frame1 = document.getElementById("frame1");

      startScreen.classList.add("hide");
      frame1.classList.add("started"); // hiện frame1 (opacity/visibility)

      revealCats(); // mèo xuất hiện lần lượt rồi mới bay/xoay
      startQuotes(); // bắt đầu hiệu ứng gõ chữ + xoay vòng quote

      startHeartEffect(); // kích hoạt canvas (sao + trái tim particle)

      // ---- phát nhạc nền, fade in âm lượng cho mượt ----
      var music = document.getElementById("bgMusic");
      music.volume = 0;
      music.play().catch(function (err) {
        console.warn("Không phát được nhạc:", err);
      });

      var targetVolume = 0.6; // chỉnh âm lượng tối đa tại đây (0 -> 1)
      var fadeStep = 0.02;
      var fadeInterval = setInterval(function () {
        if (music.volume < targetVolume - fadeStep) {
          music.volume += fadeStep;
        } else {
          music.volume = targetVolume;
          clearInterval(fadeInterval);
        }
      }, 60);

      // xoá hẳn màn hình chờ khỏi DOM sau khi hiệu ứng mờ xong
      setTimeout(function () {
        startScreen.style.display = "none";
      }, 900);
    });
  </script>
